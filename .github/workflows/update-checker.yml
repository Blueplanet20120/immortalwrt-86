name: Update_Checker

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 */3 * *

jobs:
  check:
    runs-on: ubuntu-latest

    steps:

    - name: Get Commit Hash
      id: getHash
      run: |
        # 克隆并获取 ImmortalWrt 的 Commit Hash
        git clone -b openwrt-25.12 https://github.com/immortalwrt/immortalwrt immortalwrt --filter=blob:none
        cd immortalwrt
        echo "SHA_01=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        cd

        # 克隆并获取 OpenWrt-Passwall 的 Commit Hash
        git clone -b main https://github.com/Openwrt-Passwall/openwrt-passwall.git openwrt-passwall --filter=blob:none
        cd openwrt-passwall
        echo "SHA_02=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        cd

    - name: Show Commit Head and Combination Heads
      id: combHeader
      run: |
        # 组合两个仓库的 Hash 值，任何一个发生变化都会改变组合值
        echo "commitHash_All=\
          ${{steps.getHash.outputs.SHA_01}}-\
          ${{steps.getHash.outputs.SHA_02}}" >> $GITHUB_OUTPUT

    - name: Compare Commit Hash
      id: cacheHash
      uses: actions/cache@v5
      with:
        path: .commitHash_All
        key: HEAD-${{ steps.combHeader.outputs.commitHash_All }}
   
    - name: Save New Commit Hash
      if: steps.cacheHash.outputs.cache-hit != 'true'
      run: |
        echo ${{ steps.combHeader.outputs.commitHash_All }} | tee .commitHash_All
        
    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3

    - name: Remove old Releases
      env:
        GH_TOKEN: ${{ secrets.OP_UPDATE }}
      run: |
        set -euo pipefail
        # 与 dev-drprasad/delete-older-releases 一致：非 draft；排除最新 KEEP 条后，
        # 在 KEEP_MIN 与 MAX_DAYS 均非 0 时，仅删除「下载量 < KEEP_MIN」或「早于 MAX_DAYS 天」的 release（含 tag）。
        REPO="${{ github.repository }}"
        KEEP=5
        KEEP_MIN=2
        MAX_DAYS=60
        RAW=$(gh api --paginate "repos/${REPO}/releases")
        DATA=$(echo "$RAW" | jq -s 'flatten(1)')
        COUNT=$(echo "$DATA" | jq 'length')
        if [ "${COUNT:-0}" -eq 0 ]; then
          echo "No releases."
          exit 0
        fi
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          tag=$(echo "$line" | jq -r '.tag')
          echo "Deleting release + tag: $tag"
          gh release delete "$tag" --yes --cleanup-tag -R "$REPO" || true
        done < <(echo "$DATA" | jq -c --argjson keep "$KEEP" --argjson kmin "$KEEP_MIN" --argjson md "$MAX_DAYS" '
          [.[] | select(.draft == false and (.published_at | type == "string"))]
          | sort_by(.published_at) | reverse
          | map({
              tag: .tag_name,
              published_at: .published_at,
              dl: ([.assets[]? | .download_count // 0] | add)
            })
          | .[$keep:]
          | map(. + { days: (((now - (.published_at | fromdateiso8601)) / 86400) | floor) })
          | map(select(.dl < $kmin or .days > $md))
          | .[]
        ')
        
    - name: Trigger build
      if: steps.cacheHash.outputs.cache-hit != 'true'
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ secrets.OP_UPDATE  }}
        event-type: openwrt_source_update
